<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Barcode - Buku Resep</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #1a1a1a; /* Gelap supaya fokus ke kamera */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .scanner-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            aspect-ratio: 3/4;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 2px solid #555;
        }

        /* Elemen Video Kamera */
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay Garis Scan */
        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #00ff00;
            top: 0;
            box-shadow: 0 0 8px #00ff00;
            animation: scanAnim 2s infinite linear;
        }

        @keyframes scanAnim {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .instruction {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .instruction h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .instruction p {
            font-size: 0.9rem;
            color: #ccc;
        }

        .btn-scan {
            margin-top: 25px;
            width: 80%;
            max-width: 300px;
            padding: 15px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-scan:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="instruction">
        <h3>Scan Barcode</h3>
        <p>Arahkan kamera ke barcode yang ada di <b>Buku Resep</b> Anda</p>
    </div>

    <div class="scanner-container">
        <video id="video" autoplay playsinline></video>
        
        <div class="scan-overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <button class="btn-scan" onclick="goToNextPage()">MULAI SCAN</button>

    <script>
        const video = document.getElementById('video');

        // Fungsi untuk mengaktifkan kamera belakang
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment" // Ini perintah untuk pakai kamera belakang
                    } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Gagal akses kamera: ", err);
                alert("Mohon izinkan akses kamera untuk melanjutkan.");
            }
        }

        // Pindah ke halaman 3
        function goToNextPage() {
            window.location.href = "3.html";
        }

        // Jalankan kamera saat halaman dimuat
        window.addEventListener('load', startCamera);
    </script>

</body>
</html>
