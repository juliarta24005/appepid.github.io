<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambil Foto Masakan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* Detail Informasi Resep */
        .info-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .info-card h4 {
            color: #777;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-card p {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            margin-bottom: 10px;
        }

        /* Area Kamera */
        .camera-section {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .instruction-text {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Preview Hasil Foto */
        #photo-preview {
            width: 100%;
            border-radius: 15px;
            display: none; /* Sembunyi sebelum ada foto */
            margin-top: 15px;
            border: 3px solid #007bff;
        }

        /* Tombol-tombol */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .btn-capture {
            background-color: #007bff;
            color: white;
        }

        .btn-send {
            background-color: #28a745;
            color: white;
            display: none; /* Sembunyi sebelum ada foto */
            margin-top: 10px;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div class="info-card">
        <h4>Kode Resep:</h4>
        <p>001</p>
        <h4>Nama Resep:</h4>
        <p>Jukut Urap Gonda</p>
    </div>

    <div class="camera-section">
        <p class="instruction-text">📸 Silakan ambil foto hasil masakan Anda</p>
        
        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
        </div>

        <button class="btn btn-capture" id="capture-btn">Ambil Gambar</button>

        <canvas id="canvas"></canvas>

        <img id="photo-preview" alt="Hasil Foto">

        <button class="btn btn-send" id="send-btn" onclick="window.location.href='4.html'">Kirim Bukti</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const photoPreview = document.getElementById('photo-preview');
        const sendBtn = document.getElementById('send-btn');

        // Akses kamera belakang
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal mengakses kamera: " + err);
            }
        }

        // Fungsi ambil gambar
        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Gambar video ke canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Ubah canvas jadi gambar (base64)
            const dataUrl = canvas.toDataURL('image/png');
            
            // Tampilkan ke elemen img
            photoPreview.src = dataUrl;
            photoPreview.style.display = 'block';
            
            // Munculkan tombol kirim
            sendBtn.style.display = 'block';
            
            // Ubah teks tombol capture kalau mau foto ulang
            captureBtn.innerText = "Foto Ulang";
            captureBtn.style.backgroundColor = "#6c757d";
        });

        window.addEventListener('load', initCamera);
    </script>

</body>
</html>
