<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesai - Selamat!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .success-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Ilustrasi Centang / Trophy */
        .icon-box {
            width: 100px;
            height: 100px;
            background-color: #e7fbd3;
            color: #28a745;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.1);
        }

        h1 {
            color: #2c3e50;
            font-size: 26px;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Kotak Poin */
        .point-card {
            background: linear-gradient(135deg, #ffce00 0%, #ff9a00 100%);
            padding: 20px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 8px 20px rgba(255, 154, 0, 0.3);
            margin-bottom: 40px;
        }

        .point-card span {
            display: block;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .point-card strong {
            font-size: 36px;
            display: block;
            margin-top: 5px;
        }

        .btn-home {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-home:active {
            transform: scale(0.96);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="icon-box">
            ✓
        </div>

        <h1>Selamat! 🎉</h1>
        <p>Terima kasih sudah memasak sehat hari ini. Bukti foto Anda telah berhasil kami terima.</p>

        <div class="point-card">
            <span>Kamu Mendapatkan</span>
            <strong>+50 POIN</strong>
        </div>

        <p style="font-size: 13px; font-style: italic;">"Kesehatan adalah investasi terbaik untuk masa depanmu."</p>

        <a href="index.html" class="btn-home">Kembali ke Beranda</a>
    </div>

</body>
</html>
